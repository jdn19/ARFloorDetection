<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Vision AR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
  body { margin:0; overflow:hidden; font-family:sans-serif; }

  video {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    object-fit:cover;
    z-index:-2;
  }

  #glassOverlay {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    backdrop-filter: blur(10px) saturate(140%);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    background: rgba(255,255,255,0.05);
    z-index:-1;
    pointer-events:none;
  }

  #home {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10;
  }

  .glass-card {
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.08);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 30px;
    text-align:center;
    color:white;
    width: 80%;
    max-width: 320px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
  }

  .title { font-size:22px; margin-bottom:10px; }
  .subtitle { opacity:0.7; margin-bottom:20px; }

  .btn {
    padding:14px 25px;
    border-radius:999px;
    border:none;
    background: rgba(255,255,255,0.2);
    color:white;
    cursor:pointer;
  }

  #info {
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    color:white;
    z-index:5;
    display:none;
  }
</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>
<div id="glassOverlay"></div>

<div id="home">
  <div class="glass-card">
    <div class="title">Vision AR</div>
    <div class="subtitle">Seamless Reality Experience</div>
    <button class="btn" onclick="startAR()">Enter</button>
  </div>
</div>

<div id="info">Tap layar untuk spawn object</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js";

let scene, camera, renderer;
let xrSession, refSpace, viewerSpace, hitTestSource;
let currentHitPose = null;

// biarin ini (gak ganggu)
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(stream => {
  document.getElementById("camera").srcObject = stream;
});

// START AR (TOMBOL LO)
window.startAR = async function() {

  if (!navigator.xr) {
    alert("Device tidak support AR");
    return;
  }

  const supported = await navigator.xr.isSessionSupported("immersive-ar");
  if (!supported) {
    alert("AR tidak didukung di HP ini");
    return;
  }

  const home = document.getElementById("home");
  const glass = document.getElementById("glassOverlay");

  home.style.opacity = "0";
  glass.style.opacity = "0";

  setTimeout(async () => {
    home.style.display = "none";
    glass.style.display = "none";
    document.getElementById("info").style.display = "block";

    await initAR();
  }, 400);
};

// INIT AR
async function initAR() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);

  renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;

  document.body.appendChild(renderer.domElement);

  // 🔥 START REAL AR SESSION
  xrSession = await navigator.xr.requestSession("immersive-ar", {
    requiredFeatures: ["hit-test"]
  });

  renderer.xr.setSession(xrSession);

  refSpace = await xrSession.requestReferenceSpace("local");
  viewerSpace = await xrSession.requestReferenceSpace("viewer");

  hitTestSource = await xrSession.requestHitTestSource({
    space: viewerSpace
  });

  const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
  scene.add(light);

  // TAP → SPAWN OBJECT
  xrSession.addEventListener("select", () => {
    if (!currentHitPose) return;

    const mesh = new THREE.Mesh(
      new THREE.BoxGeometry(0.2,0.2,0.2),
      new THREE.MeshStandardMaterial({
        color:0xffffff,
        metalness:0.8,
        roughness:0.2
      })
    );

    mesh.position.setFromMatrixPosition(currentHitPose.transform.matrix);
    scene.add(mesh);
  });

  renderer.setAnimationLoop(render);
}

// LOOP
function render(time, frame) {
  if (frame && hitTestSource) {
    const hits = frame.getHitTestResults(hitTestSource);

    if (hits.length > 0) {
      currentHitPose = hits[0].getPose(refSpace);
    }
  }

  renderer.render(scene, camera);
}

// RESIZE
window.addEventListener("resize", () => {
  if (!camera || !renderer) return;

  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
