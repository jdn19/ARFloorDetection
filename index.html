<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Vision AR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
  body { margin:0; overflow:hidden; font-family:sans-serif; }

  video {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    object-fit:cover;
    z-index:-2;
  }

  #glassOverlay {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    backdrop-filter: blur(10px) saturate(140%);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    background: rgba(255,255,255,0.05);
    z-index:-1;
    pointer-events:none;
  }

  #home {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10;
  }

  .glass-card {
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.08);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 30px;
    text-align:center;
    color:white;
    width: 80%;
    max-width: 320px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    animation: float 4s ease-in-out infinite;
  }

  .title { font-size:22px; margin-bottom:10px; }
  .subtitle { opacity:0.7; margin-bottom:20px; }

  .btn {
    padding:14px 25px;
    border-radius:999px;
    border:none;
    background: rgba(255,255,255,0.2);
    color:white;
    cursor:pointer;
  }

  #version {
    position:fixed;
    bottom:20px;
    left:0;
    width:100%;
    text-align:center;
    color:white;
    opacity:0.6;
    font-size:12px;
    z-index:20;
  }

  #info {
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    color:white;
    z-index:5;
    display:none;
  }
</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>
<div id="glassOverlay"></div>

<div id="home">
  <div class="glass-card">
    <div class="title">Vision AR</div>
    <div class="subtitle">Seamless Reality Experience</div>
    <button class="btn" onclick="startAR()">Enter</button>
  </div>
</div>

<div id="version"></div>
<div id="info">Tap layar untuk spawn object</div>

<script type="module">

const APP_VERSION = "v1.0.8";
document.getElementById("version").innerText = APP_VERSION;

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js";

let scene, camera, renderer;
let raycaster;

let targetRot = {x:0,y:0,z:0};
let currentRot = {x:0,y:0,z:0};

navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(stream => {
  document.getElementById("camera").srcObject = stream;
});

window.startAR = async function() {

  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    await DeviceOrientationEvent.requestPermission();
  }

  window.addEventListener("deviceorientation", (e)=>{
    targetRot.y = THREE.MathUtils.degToRad(e.alpha || 0);
    targetRot.x = THREE.MathUtils.degToRad((e.beta || 0) - 90);
    targetRot.z = THREE.MathUtils.degToRad(e.gamma || 0);
  });

  const home = document.getElementById("home");
  const glass = document.getElementById("glassOverlay");

  home.style.opacity = "0";
  glass.style.opacity = "0";

  setTimeout(()=>{
    home.style.display = "none";
    glass.style.display = "none";
    document.getElementById("info").style.display = "block";

    init();
  },400);
};

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 50);
  camera.position.set(0,1.6,2);

  renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);

  document.body.appendChild(renderer.domElement);

  const light = new THREE.HemisphereLight(0xffffff,0x444444,1);
  scene.add(light);

  raycaster = new THREE.Raycaster();

  window.addEventListener("click", onTap);

  animate();
}

// 🔥 FIX: INTERSECT PLANE MANUAL
function onTap(e) {

  const mouse = new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );

  raycaster.setFromCamera(mouse, camera);

  const plane = new THREE.Plane(new THREE.Vector3(0,1,0), 0); // Y=0
  const point = new THREE.Vector3();

  raycaster.ray.intersectPlane(plane, point);

  if (!point) return;

  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(0.25,0.25,0.25),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );

  mesh.position.copy(point);
  mesh.position.y += 0.125;

  scene.add(mesh);
}

function animate() {
  requestAnimationFrame(animate);

  currentRot.x += (targetRot.x - currentRot.x)*0.1;
  currentRot.y += (targetRot.y - currentRot.y)*0.1;
  currentRot.z += (targetRot.z - currentRot.z)*0.1;

  camera.rotation.order = "YXZ";
  camera.rotation.x = currentRot.x;
  camera.rotation.y = currentRot.y;
  camera.rotation.z = currentRot.z;

  renderer.render(scene, camera);
}

window.addEventListener("resize", ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

</script>

</body>
</html>
