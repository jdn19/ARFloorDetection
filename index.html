<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Vision AR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
  body { margin:0; overflow:hidden; font-family:sans-serif; }

  video {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    object-fit:cover;
    z-index:-2;
  }

  #glassOverlay {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    backdrop-filter: blur(10px) saturate(140%);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    background: rgba(255,255,255,0.05);
    z-index:-1;
    pointer-events:none;
  }

  #home {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10;
  }

  .glass-card {
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.08);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 30px;
    text-align:center;
    color:white;
    width: 80%;
    max-width: 320px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
  }

  .title { font-size:22px; margin-bottom:10px; }
  .subtitle { opacity:0.7; margin-bottom:20px; }

  .btn {
    padding:14px 25px;
    border-radius:999px;
    border:none;
    background: rgba(255,255,255,0.2);
    color:white;
    cursor:pointer;
  }

  #version {
    position:fixed;
    bottom:20px;
    left:0;
    width:100%;
    text-align:center;
    color:white;
    opacity:0.6;
    font-size:12px;
    z-index:20;
  }

  #info {
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    color:white;
    z-index:5;
    display:none;
  }
</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>
<div id="glassOverlay"></div>

<div id="home">
  <div class="glass-card">
    <div class="title">Vision AR</div>
    <div class="subtitle">Seamless Reality Experience</div>
    <button class="btn" onclick="startAR()">Enter</button>
  </div>
</div>

<div id="version"></div>

<div id="info">Tap layar untuk spawn object</div>

<script type="module">

// 🔥 VERSION
const APP_VERSION = "v1.0.4";
document.getElementById("version").innerText = APP_VERSION;

import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js";

let scene, camera, renderer;
let raycaster, floor, reticle;

// 🔥 GYRO DATA
let targetRotation = { x:0, y:0, z:0 };
let currentRotation = { x:0, y:0, z:0 };

// CAMERA BG
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(stream => {
  document.getElementById("camera").srcObject = stream;
});

// START
window.startAR = async function() {

  // iOS permission
  if (typeof DeviceOrientationEvent.requestPermission === 'function') {
    await DeviceOrientationEvent.requestPermission();
  }

  window.addEventListener("deviceorientation", (e) => {
    targetRotation.y = THREE.MathUtils.degToRad(e.alpha || 0);
    targetRotation.x = THREE.MathUtils.degToRad((e.beta || 0) - 90);
    targetRotation.z = THREE.MathUtils.degToRad(e.gamma || 0);
  });

  const home = document.getElementById("home");
  const glass = document.getElementById("glassOverlay");

  home.style.opacity = "0";
  glass.style.opacity = "0";

  setTimeout(() => {
    home.style.display = "none";
    glass.style.display = "none";
    document.getElementById("info").style.display = "block";

    init();
  }, 400);
};

// INIT
function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);
  camera.position.set(0, 1.6, 2);

  renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;

  document.body.appendChild(renderer.domElement);

  // LIGHT
  const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
  scene.add(hemi);

  const dir = new THREE.DirectionalLight(0xffffff, 1);
  dir.position.set(2,4,2);
  dir.castShadow = true;
  scene.add(dir);

  // FLOOR
  floor = new THREE.Mesh(
    new THREE.PlaneGeometry(20,20),
    new THREE.ShadowMaterial({ opacity: 0.3 })
  );
  floor.rotation.x = -Math.PI/2;
  floor.receiveShadow = true;
  scene.add(floor);

  // RETICLE
  const ringGeo = new THREE.RingGeometry(0.15, 0.2, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color:0xffffff,
    transparent:true,
    opacity:0.7
  });

  reticle = new THREE.Mesh(ringGeo, ringMat);
  reticle.rotation.x = -Math.PI/2;
  scene.add(reticle);

  raycaster = new THREE.Raycaster();

  window.addEventListener("click", spawnObject);

  animate();
}

// RETICLE
function updateReticle() {
  const center = new THREE.Vector2(0,0);
  raycaster.setFromCamera(center, camera);

  const hits = raycaster.intersectObject(floor);

  if (hits.length > 0) {
    reticle.visible = true;
    reticle.position.copy(hits[0].point);
  } else {
    reticle.visible = false;
  }
}

// SPAWN
function spawnObject() {
  if (!reticle.visible) return;

  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(0.25,0.25,0.25),
    new THREE.MeshStandardMaterial({
      color:0xffffff,
      metalness:0.6,
      roughness:0.3
    })
  );

  mesh.position.copy(reticle.position);
  mesh.position.y += 0.125;
  mesh.castShadow = true;

  scene.add(mesh);
}

// LOOP (🔥 SMOOTH GYRO)
function animate() {
  requestAnimationFrame(animate);

  // smoothing biar gak geter
  currentRotation.x += (targetRotation.x - currentRotation.x) * 0.1;
  currentRotation.y += (targetRotation.y - currentRotation.y) * 0.1;
  currentRotation.z += (targetRotation.z - currentRotation.z) * 0.1;

  camera.rotation.order = "YXZ";
  camera.rotation.x = currentRotation.x;
  camera.rotation.y = currentRotation.y;
  camera.rotation.z = currentRotation.z;

  updateReticle();

  renderer.render(scene, camera);
}

// RESIZE
window.addEventListener("resize", () => {
  if (!camera || !renderer) return;

  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
