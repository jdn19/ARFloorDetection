<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Vision AR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<style>
  body { margin:0; overflow:hidden; font-family:sans-serif; }

  /* CAMERA */
  video {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    object-fit:cover;
    z-index:-2;
  }

  /* GLASS OVERLAY (ONLY HOMEPAGE) */
  #glassOverlay {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    backdrop-filter: blur(10px) saturate(140%);
    -webkit-backdrop-filter: blur(10px) saturate(140%);
    background: rgba(255,255,255,0.05);
    z-index:-1;
    pointer-events:none;
  }

  /* HOMEPAGE */
  #home {
    position:fixed;
    top:0; left:0;
    width:100%; height:100%;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:10;
  }

  .glass-card {
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(255,255,255,0.08);
    border-radius: 24px;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 30px;
    text-align:center;
    color:white;
    width: 80%;
    max-width: 320px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.4);
    animation: float 4s ease-in-out infinite;
  }

  @keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
  }

  .title {
    font-size:22px;
    margin-bottom:10px;
  }

  .subtitle {
    opacity:0.7;
    margin-bottom:20px;
  }

  .btn {
    padding:14px 25px;
    border-radius:999px;
    border:none;
    background: rgba(255,255,255,0.2);
    color:white;
    cursor:pointer;
  }

  /* AR INFO */
  #info {
    position:absolute;
    top:20px;
    width:100%;
    text-align:center;
    color:white;
    z-index:5;
    display:none;
  }
</style>
</head>

<body>

<video id="camera" autoplay playsinline></video>
<div id="glassOverlay"></div>

<div id="home">
  <div class="glass-card">
    <div class="title">Vision AR</div>
    <div class="subtitle">Seamless Reality Experience</div>
    <button class="btn" onclick="startAR()">Enter</button>
  </div>
</div>

<div id="info">Tap layar untuk spawn object</div>

<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js";

let scene, camera, renderer;
let raycaster, floor;

// CAMERA
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(stream => {
  document.getElementById("camera").srcObject = stream;
});

// START
window.startAR = function() {
  const home = document.getElementById("home");
  const glass = document.getElementById("glassOverlay");

  home.style.transition = "opacity 0.4s ease";
  glass.style.transition = "opacity 0.4s ease";

  home.style.opacity = "0";
  glass.style.opacity = "0";

  setTimeout(() => {
    home.style.display = "none";
    glass.style.display = "none";
    document.getElementById("info").style.display = "block";

    init();
  }, 400);
};

// INIT
function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth / window.innerHeight,
    0.01,
    20
  );

  // 🔥 kamera natural (tinggi manusia)
  camera.position.set(0, 1.6, 2);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);

  // 🔥 SHADOW ON
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  document.body.appendChild(renderer.domElement);

  // 🔥 LIGHTING REALISTIC
  const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
  scene.add(hemi);

  const dir = new THREE.DirectionalLight(0xffffff, 1);
  dir.position.set(2,4,2);
  dir.castShadow = true;
  dir.shadow.mapSize.set(1024,1024);
  scene.add(dir);

  // 🔥 FLOOR (INVISIBLE + SHADOW)
  floor = new THREE.Mesh(
    new THREE.PlaneGeometry(20,20),
    new THREE.ShadowMaterial({ opacity: 0.3 })
  );
  floor.rotation.x = -Math.PI/2;
  floor.receiveShadow = true;
  scene.add(floor);

  raycaster = new THREE.Raycaster();

  // TAP SPAWN
  window.addEventListener("click", spawnObject);

  animate();
}

// SPAWN
function spawnObject(e) {

  const mouse = new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );

  raycaster.setFromCamera(mouse, camera);

  const hits = raycaster.intersectObject(floor);

  if (hits.length > 0) {
    const point = hits[0].point;

    const mesh = new THREE.Mesh(
      new THREE.BoxGeometry(0.25,0.25,0.25),
      new THREE.MeshStandardMaterial({
        color:0xffffff,
        metalness:0.6,
        roughness:0.3
      })
    );

    mesh.position.copy(point);
    mesh.position.y += 0.125;
    mesh.castShadow = true;

    scene.add(mesh);
  }
}

// LOOP
function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

// RESIZE
window.addEventListener("resize", () => {
  if (!camera || !renderer) return;

  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
