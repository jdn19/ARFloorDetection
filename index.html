<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js";

let scene, camera, renderer;
let raycaster, floor;

// CAMERA (tetep)
navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}})
.then(stream => {
  document.getElementById("camera").srcObject = stream;
});

// START
window.startAR = function() {
  const home = document.getElementById("home");
  const glass = document.getElementById("glassOverlay");

  home.style.opacity = "0";
  glass.style.opacity = "0";

  setTimeout(() => {
    home.style.display = "none";
    glass.style.display = "none";
    document.getElementById("info").style.display = "block";

    init();
  }, 400);
};

function init() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(
    70,
    window.innerWidth / window.innerHeight,
    0.01,
    20
  );

  // 🔥 posisi kamera biar natural (tinggi manusia)
  camera.position.set(0, 1.6, 2);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;

  document.body.appendChild(renderer.domElement);

  // 🔥 LIGHTING REALISTIC
  const hemi = new THREE.HemisphereLight(0xffffff, 0x444444, 1);
  scene.add(hemi);

  const dir = new THREE.DirectionalLight(0xffffff, 1);
  dir.position.set(2,4,2);
  dir.castShadow = true;
  dir.shadow.mapSize.set(1024,1024);
  scene.add(dir);

  // 🔥 FLOOR (RECEIVE SHADOW)
  floor = new THREE.Mesh(
    new THREE.PlaneGeometry(20,20),
    new THREE.ShadowMaterial({ opacity: 0.3 })
  );
  floor.rotation.x = -Math.PI/2;
  floor.receiveShadow = true;
  scene.add(floor);

  raycaster = new THREE.Raycaster();

  // TAP → SPAWN
  window.addEventListener("click", spawnObject);

  animate();
}

function spawnObject(e) {

  const mouse = new THREE.Vector2(
    (e.clientX / window.innerWidth) * 2 - 1,
    -(e.clientY / window.innerHeight) * 2 + 1
  );

  raycaster.setFromCamera(mouse, camera);

  const hits = raycaster.intersectObject(floor);

  if (hits.length > 0) {
    const point = hits[0].point;

    const mesh = new THREE.Mesh(
      new THREE.BoxGeometry(0.25,0.25,0.25),
      new THREE.MeshStandardMaterial({
        color:0xffffff,
        metalness:0.6,
        roughness:0.3
      })
    );

    mesh.position.copy(point);
    mesh.position.y += 0.125; // biar duduk di atas lantai
    mesh.castShadow = true;

    scene.add(mesh);
  }
}

function animate() {
  requestAnimationFrame(animate);
  renderer.render(scene, camera);
}

window.addEventListener("resize", () => {
  if (!camera || !renderer) return;

  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
