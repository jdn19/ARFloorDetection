<script type="module">
import * as THREE from "https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js";

let scene, camera, renderer;
let xrSession = null;
let hitTestSource = null;
let viewerSpace = null;
let refSpace = null;
let currentHitPose = null;

// START AR (PAKE TOMBOL LO)
window.startAR = async function() {

  if (!navigator.xr) {
    alert("HP lo gak support AR 😭");
    return;
  }

  const supported = await navigator.xr.isSessionSupported("immersive-ar");
  if (!supported) {
    alert("AR gak didukung di device ini");
    return;
  }

  const home = document.getElementById("home");
  const glass = document.getElementById("glassOverlay");

  home.style.opacity = "0";
  glass.style.opacity = "0";

  setTimeout(async () => {
    home.style.display = "none";
    glass.style.display = "none";
    document.getElementById("info").style.display = "block";

    await initXR();
  }, 400);
};

// INIT XR
async function initXR() {

  scene = new THREE.Scene();

  camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.01, 20);

  renderer = new THREE.WebGLRenderer({alpha:true, antialias:true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;

  document.body.appendChild(renderer.domElement);

  // 🔥 REQUEST AR SESSION (INI KUNCI NYA)
  xrSession = await navigator.xr.requestSession("immersive-ar", {
    requiredFeatures: ["hit-test"]
  });

  renderer.xr.setSession(xrSession);

  refSpace = await xrSession.requestReferenceSpace("local");
  viewerSpace = await xrSession.requestReferenceSpace("viewer");

  hitTestSource = await xrSession.requestHitTestSource({
    space: viewerSpace
  });

  const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
  scene.add(light);

  // TAP → SPAWN
  xrSession.addEventListener("select", () => {
    if (!currentHitPose) return;

    const geo = new THREE.BoxGeometry(0.2,0.2,0.2);
    const mat = new THREE.MeshStandardMaterial({
      color:0xffffff,
      metalness:0.8,
      roughness:0.2
    });

    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.setFromMatrixPosition(currentHitPose.transform.matrix);

    scene.add(mesh);
  });

  renderer.setAnimationLoop(render);
}

// LOOP
function render(time, frame) {

  if (frame && hitTestSource) {
    const hits = frame.getHitTestResults(hitTestSource);

    if (hits.length > 0) {
      currentHitPose = hits[0].getPose(refSpace);
    }
  }

  renderer.render(scene, camera);
}

// RESIZE
window.addEventListener("resize", () => {
  if (!camera || !renderer) return;

  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
